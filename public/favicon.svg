<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b87f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Teddy bear head -->
  <circle cx="50" cy="50" r="35" fill="url(#grad)"/>
  
  <!-- Left ear -->
  <circle cx="25" cy="25" r="15" fill="url(#grad)"/>
  
  <!-- Right ear -->
  <circle cx="75" cy="25" r="15" fill="url(#grad)"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="45" r="4" fill="white"/>
  <circle cx="60" cy="45" r="4" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="6" ry="4" fill="white"/>
  
  <!-- Smile -->
  <path d="M 40 60 Q 50 65 60 60" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
